<style>
:root{color-scheme:light}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f6f9;color:#1a2230;font-size:14px}
.wrap{max-width:1280px;margin:0 auto;padding:18px}
h1{font-size:20px;margin:0 0 2px}
.sub{color:#667085;font-size:12.5px;margin-bottom:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.card{background:#fff;border:1px solid #e6e9ef;border-radius:10px;padding:12px 14px}
.card .lab{font-size:11px;color:#667085;text-transform:uppercase;letter-spacing:.4px}
.card .val{font-size:22px;font-weight:700;margin-top:3px}
.card .val.money{color:#0a7c3a}
.card.hl{background:#0b3d66;border-color:#0b3d66}
.card.hl .lab,.card.hl .val{color:#fff}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
input[type=text]{padding:8px 11px;border:1px solid #cfd6e0;border-radius:8px;min-width:220px;font-size:13px}
.seg{display:inline-flex;background:#fff;border:1px solid #cfd6e0;border-radius:8px;overflow:hidden}
.seg button{border:0;background:#fff;padding:7px 11px;cursor:pointer;font-size:12.5px;color:#334}
.seg button.on{background:#0b3d66;color:#fff}
.chk{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #cfd6e0;border-radius:8px;padding:7px 11px;font-size:12.5px;cursor:pointer}
.tablewrap{background:#fff;border:1px solid #e6e9ef;border-radius:10px;overflow:auto}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid #eef1f5;white-space:nowrap}
th{background:#fafbfc;position:sticky;top:0;cursor:pointer;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;color:#556}
th:hover{color:#0b3d66}
tr:hover td{background:#f8fafc}
td.money{font-weight:600;color:#0a7c3a;text-align:right}
td.num{text-align:right;color:#334}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-grace{background:#fff4d6;color:#8a6d00}
.b-recent{background:#ffe3d6;color:#a03400}
.b-long{background:#eceff3;color:#5a6472}
.pill{display:inline-block;padding:1px 6px;border-radius:5px;font-size:10.5px;font-weight:600;background:#eef}
.pill.mt{background:#e6f7ee;color:#0a7c3a}
.pill.lp{background:#fdeaea;color:#b42318}
a.call{color:#0b66c3;text-decoration:none;font-weight:600}
a.wa{color:#128c4b;text-decoration:none;margin-left:8px;font-weight:600}
.nophone{color:#b0b7c2;font-style:italic}
select.cs{border:1px solid #cfd6e0;border-radius:6px;padding:4px 6px;font-size:12px}
.cs.done{background:#e6f7ee}
.cs.nocon{background:#fff4d6}
.cs.callback{background:#e7f0fb}
.cs.closed{background:#f0f0f0;color:#888}
tr.rdone{opacity:.55}
.note{font-size:11px;color:#8a93a0;max-width:220px;white-space:normal}
.foot{color:#8a93a0;font-size:11.5px;margin-top:12px;line-height:1.6}
.count{font-size:12.5px;color:#556;margin:2px 0 8px}
</style>
</head>

const LS_KEY='chauhan_callstatus_v1';
let store={};
try{store=JSON.parse(localStorage.getItem(LS_KEY)||'{}')}catch(e){store={}}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(store))}
const inr=n=>n==null?'—':'₹'+Number(n).toLocaleString('en-IN');
let sortKey='arrears_today', sortDir=-1;
let fStatus='all', fFreq='all';

function statusBadge(s){
 const m={'In Grace':'b-grace','Lapsed Recently':'b-recent','Lapsed Long-Term':'b-long'};
 return '<span class="badge '+(m[s]||'')+'">'+s.replace('Lapsed ','')+'</span>';
}
function waMessage(r){
 const first=(r.name||'Policyholder').split(' ')[0];
 const amt=r.arrears_today!=null?('of ₹'+Number(r.arrears_today).toLocaleString('en-IN')+' '):'';
 const since=r.fup?('pending since '+r.fup):'pending';
 return 'Namaste '+first+' 🙏\n\nReminder from Chauhan Advisory (LIC): your policy '+r.policy_number+' ('+r.plan+') premium '+amt+'is '+since+'. Kindly pay soon to keep your policy active and your family protected. Reply here or call us and we will help.\n\n— Chauhan Advisory, LIC Agent LIC01891914';
}
function phoneCell(r){
 if(!r.phone) return '<span class="nophone">no number</span>';
 const wa='https://wa.me/91'+r.phone+'?text='+encodeURIComponent(waMessage(r));
 return '<a class="call" href="tel:'+r.phone+'">'+r.phone+'</a>'+
        '<a class="wa" href="'+wa+'" target="_blank" title="Opens WhatsApp with the message ready — just press send">WhatsApp →</a>';
}
function flagPill(r){
 if(/MT/.test(r.flg+r.note)) return ' <span class="pill mt">matures</span>';
 if(/LP/.test(r.flg+r.note)) return ' <span class="pill lp">last prem</span>';
 return '';
}
function rows(){
 const q=document.getElementById('q').value.toLowerCase();
 const phoneOnly=document.getElementById('phoneOnly').checked;
 const hideDone=document.getElementById('hideDone').checked;
 let d=DATA.filter(r=>{
  if(fStatus!=='all'&&r.status!==fStatus)return false;
  if(fFreq!=='all'&&r.frequency!==fFreq)return false;
  if(phoneOnly&&!r.phone)return false;
  const cs=(store[r.policy_number]||{}).status||'';
  if(hideDone&&(cs==='Paid/Done'||cs==='Closed'))return false;
  if(q){const hay=(r.name+' '+r.policy_number+' '+r.plan).toLowerCase();if(!hay.includes(q))return false}
  return true;
 });
 d.sort((a,b)=>{
  let x=a[sortKey],y=b[sortKey];
  if(sortKey==='call'){x=(store[a.policy_number]||{}).status||'';y=(store[b.policy_number]||{}).status||''}
  if(x==null)x=-Infinity;if(y==null)y=-Infinity;
  if(typeof x==='string'||typeof y==='string'){x=(''+x).toLowerCase();y=(''+y).toLowerCase()}
  return x<y?-sortDir:x>y?sortDir:0;
 });
 return d;
}
const CS=['','Paid/Done','No answer','Call back','Not interested','Closed'];
function render(){
 const d=rows();
 const tb=document.getElementById('tb');
 tb.innerHTML=d.map(r=>{
  const st=store[r.policy_number]||{};
  const cls={'Paid/Done':'done','No answer':'nocon','Call back':'callback','Not interested':'nocon','Closed':'closed'}[st.status]||'';
  const opts=CS.map(o=>'<option '+(st.status===o?'selected':'')+'>'+(o||'—')+'</option>').join('');
  const rdone=(st.status==='Paid/Done'||st.status==='Closed')?'rdone':'';
  return '<tr class="'+rdone+'">'+
   '<td><select class="cs '+cls+'" data-p="'+r.policy_number+'">'+opts+'</select></td>'+
   '<td>'+(r.name||'—')+' '+statusBadgeMini(r)+'</td>'+
   '<td>'+phoneCell(r)+'</td>'+
   '<td>'+r.policy_number+flagPill(r)+'</td>'+
   '<td>'+r.plan+'</td>'+
   '<td>'+r.frequency+'</td>'+
   '<td>'+(r.fup||'—')+'</td>'+
   '<td class="num">'+(r.months_overdue==null?'—':r.months_overdue)+'</td>'+
   '<td class="num">'+(r.installments_due==null?'—':r.installments_due)+'</td>'+
   '<td class="money">'+inr(r.arrears_today)+'</td>'+
   '<td class="num">'+(r.lic_totprem==null?'—':inr(r.lic_totprem))+'</td>'+
   '<td>'+statusBadge(r.status)+'</td>'+
   '<td class="note">'+(r.in_pdf?'':'not in current LIC list — verify. ')+(r.note||'')+'</td>'+
   '</tr>';
 }).join('');
 document.querySelectorAll('select.cs').forEach(s=>s.onchange=e=>{
  const p=e.target.dataset.p;store[p]=store[p]||{};store[p].status=e.target.value===''?'':e.target.value;
  if(e.target.value==='—')store[p].status='';save();render();updateCards();
 });
 document.getElementById('count').textContent=d.length+' policies shown · '+
   inr(d.reduce((s,r)=>s+(r.arrears_today||0),0))+' arrears in view';
}
function statusBadgeMini(r){return ''}
function updateCards(){
 const all=DATA;
 const callable=all.filter(r=>r.phone);
 const arrPhone=callable.reduce((s,r)=>s+(r.arrears_today||0),0);
 const arrAll=all.reduce((s,r)=>s+(r.arrears_today||0),0);
 const done=Object.values(store).filter(x=>x.status==='Paid/Done').length;
 const c=[
  ['Callable (has phone)',callable.length,''],
  ['Arrears to recover (callable)',inr(arrPhone),'money'],
  ['Total lapsed / at-risk',all.length,''],
  ['Recently lapsed',all.filter(r=>r.status==='Lapsed Recently').length,''],
  ['Long-term lapsed',all.filter(r=>r.status==='Lapsed Long-Term').length,''],
  ['Marked paid/done',done,'money'],
 ];
 document.getElementById('cards').innerHTML=c.map((x,i)=>
  '<div class="card '+(i==0?'hl':'')+'"><div class="lab">'+x[0]+'</div><div class="val '+x[2]+'">'+x[1]+'</div></div>').join('');
}
document.getElementById('q').oninput=render;
document.getElementById('phoneOnly').onchange=render;
document.getElementById('hideDone').onchange=render;
document.querySelectorAll('#statusSeg button').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('#statusSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');fStatus=b.dataset.s;render();});
document.querySelectorAll('#freqSeg button').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('#freqSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');fFreq=b.dataset.f;render();});
document.querySelectorAll('#tbl th').forEach(th=>th.onclick=()=>{
 const k=th.dataset.k;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='arrears_today'||k==='months_overdue'||k==='installments_due'||k==='lic_totprem')?-1:1}render();});
document.getElementById('foot').innerHTML=
 'Arrears = installments due from First Unpaid Premium (FUP) to today × installment premium, by payment mode. '+
 '<b>LIC printed</b> = outstanding as printed on the most recent monthly Premium Due List. '+
 'Policies flagged <span class="pill mt">matures</span>/<span class="pill lp">last prem</span> need only one final premium. '+
 'Long-term lapsed policies not in current LIC due-lists are shown for follow-up but arrears should be reconfirmed with LIC (revival rules & interest apply). '+'<br><b>WhatsApp →</b> opens a ready-to-send personalised message (free, no API needed) — just press send.';
updateCards();render();
</script>
